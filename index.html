<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUTO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050510;
overflow:hidden;
}

.container{
width:90%;
max-width:400px;
padding:30px;
border-radius:25px;
background:rgba(15,15,30,.95);
box-shadow:
0 0 20px #8a2be2,
0 0 40px #2196f3;
}

.logo{
text-align:center;
font-size:55px;
font-weight:bold;
margin-bottom:35px;
animation:rgbText 3s infinite;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin:20px 0;
color:#fff;
font-size:26px;
}

.btn{
width:90px;
height:50px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
color:white;
cursor:pointer;
animation:rgbButton 3s infinite;
}

#getKey{
display:none;
width:100%;
height:55px;
margin-top:25px;
border:none;
border-radius:15px;
font-size:24px;
font-weight:bold;
color:white;
cursor:pointer;
animation:rgbButton 3s infinite;
}

@keyframes rgbText{
0%{
color:#8a2be2;
text-shadow:0 0 20px #8a2be2;
}
33%{
color:#2196f3;
text-shadow:0 0 20px #2196f3;
}
66%{
color:#ff0033;
text-shadow:0 0 20px #ff0033;
}
100%{
color:#8a2be2;
text-shadow:0 0 20px #8a2be2;
}
}

@keyframes rgbButton{
0%{
background:#8a2be2;
box-shadow:0 0 20px #8a2be2;
}
33%{
background:#2196f3;
box-shadow:0 0 20px #2196f3;
}
66%{
background:#ff0033;
box-shadow:0 0 20px #ff0033;
}
100%{
background:#8a2be2;
box-shadow:0 0 20px #8a2be2;
}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">FLUTO</div>

<div class="row">
<span>Join Channel</span>
<button class="btn" id="joinBtn">25</button>
</div>

<div class="row">
<span>Follow TikTok</span>
<button class="btn" id="tiktokBtn">15</button>
</div>

<button id="getKey">GET KEY</button>

</div>

<script>

let joinDone=false;
let tiktokDone=false;

document.getElementById("joinBtn").onclick=function(){

window.open(
"https://whatsapp.com/channel/0029Vb7BMKU6mYPSsNzTWs45",
"_blank"
);

this.disabled=true;

let time=25;

let run=setInterval(()=>{
time--;
this.innerHTML=time;

if(time<=0){
clearInterval(run);
this.innerHTML="✓";
joinDone=true;
checkDone();
}
},1000);

};

document.getElementById("tiktokBtn").onclick=function(){

window.open(
"https://www.tiktok.com/@anzyonly",
"_blank"
);

this.disabled=true;

let time=15;

let run=setInterval(()=>{
time--;
this.innerHTML=time;

if(time<=0){
clearInterval(run);
this.innerHTML="✓";
tiktokDone=true;
checkDone();
}
},1000);

};

function checkDone(){
if(joinDone && tiktokDone){
document.getElementById("getKey").style.display="block";
}
}

document.getElementById("getKey").onclick=function(){
window.open(
"https://pastebin.com/KCRbyyee",
"_blank"
);
};

</script>

</body>
</html>
