<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>AI Hacker — HOLO v6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&family=Fira+Code:wght@400;600&display=swap');

        :root {
            --cyan: #00f0ff;
            --magenta: #f000ff;
            --green: #00ff41;
            --gold: #ffd700;
            --dark: #050508;
            --font: 'Rajdhani', sans-serif;
            --disp: 'Orbitron', monospace;
            --code: 'Fira Code', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--dark);
            min-height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            perspective: 1400px; color: #fff;
            cursor: default;
        }

        /* ===== 3D HOLOGRAPHIC SCENE ===== */
        #holo-scene {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at center, #0a0a20 0%, #050508 70%);
        }
        #holo-scene canvas {
            display: block; width: 100%; height: 100%;
        }

        /* Scanlines + CRT effect */
        .crt {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
        }
        .crt::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.008) 2px, rgba(0,240,255,0.008) 4px);
        }
        .crt::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.85) 100%);
        }
        .noise {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ===== CHAT CARD — HOLOGRAPHIC ===== */
        .chat-wrap {
            position: relative; z-index: 10;
            width: 620px; max-width: 95vw;
            height: 800px; max-height: 96vh;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
            border-radius: 20px;
        }

        .chat-card {
            width: 100%; height: 100%;
            background: rgba(5,5,12,0.82);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0,240,255,0.08);
            border-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden;
            position: relative;
            box-shadow:
                0 0 60px rgba(0,240,255,0.04),
                0 0 120px rgba(240,0,255,0.02),
                inset 0 0 80px rgba(0,240,255,0.01);
        }

        /* Holographic edge glow */
        .chat-card::before {
            content: ''; position: absolute; inset: -1px;
            border-radius: 21px; z-index: -1;
            background: conic-gradient(from 0deg at 50% 50%,
                rgba(0,240,255,0.15), rgba(240,0,255,0.1),
                rgba(0,240,255,0.05), rgba(240,0,255,0.15),
                rgba(0,240,255,0.1), rgba(0,240,255,0.15));
            animation: edgePulse 4s ease-in-out infinite;
        }
        @keyframes edgePulse {
            0%,100% { opacity: 0.3; filter: hue-rotate(0deg); }
            50% { opacity: 0.7; filter: hue-rotate(30deg); }
        }

        /* ===== HEADER ===== */
        .header {
            padding: 10px 18px;
            border-bottom: 1px solid rgba(0,240,255,0.06);
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; background: rgba(0,0,0,0.2);
        }
        .h-avatar {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg, rgba(0,240,255,0.12), rgba(240,0,255,0.12));
            border: 1px solid rgba(0,240,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
            transform: translateZ(5px);
            box-shadow: 0 0 20px rgba(0,240,255,0.05);
        }
        .h-info h1 {
            font-family: var(--disp); font-size: 14px; font-weight: 700;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .h-info .h-status {
            font-size: 10px; color: var(--green); display: flex; align-items: center; gap: 5px;
        }
        .h-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 6px var(--green);
            animation: pulseD 1.5s ease-in-out infinite;
        }
        @keyframes pulseD { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }
        .h-badge {
            margin-left: auto;
            font-family: var(--code); font-size: 8px;
            color: rgba(0,240,255,0.25);
            border: 1px solid rgba(0,240,255,0.06);
            padding: 3px 10px; border-radius: 20px;
            letter-spacing: 1px; white-space: nowrap;
        }
        .h-lang {
            font-family: var(--code); font-size: 9px;
            padding: 2px 8px; border-radius: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0,240,255,0.05);
            color: var(--cyan); margin-left: 4px;
        }

        /* ===== MESSAGES ===== */
        .msgs {
            flex: 1; overflow-y: auto; padding: 12px 14px;
            display: flex; flex-direction: column; gap: 8px;
            scroll-behavior: smooth;
        }
        .msgs::-webkit-scrollbar { width: 2px; }
        .msgs::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.15); border-radius: 10px; }

        .msg {
            display: flex; flex-direction: column;
            max-width: 94%; animation: msgUp .25s ease-out both;
        }
        @keyframes msgUp { 0%{opacity:0;transform:translateY(12px)scale(.96)} 100%{opacity:1;transform:translateY(0)scale(1)} }
        .msg.ai { align-self: flex-start; }
        .msg.usr { align-self: flex-end; }

        .m-label {
            font-size: 8px; font-weight: 600; letter-spacing: .6px;
            margin-bottom: 2px; padding: 0 3px;
        }
        .msg.ai .m-label { color: var(--cyan); }
        .msg.usr .m-label { color: var(--magenta); text-align: right; }

        .bub {
            padding: 9px 14px; border-radius: 12px;
            font-size: 13.5px; line-height: 1.5;
            word-wrap: break-word; position: relative;
            border: 1px solid transparent;
        }
        .msg.ai .bub {
            background: rgba(0,240,255,0.04);
            border-color: rgba(0,240,255,0.08);
            border-bottom-left-radius: 2px;
            color: #d0f0ff;
        }
        .msg.ai .bub::before {
            content: '◈'; position: absolute; left: -9px; bottom: 3px;
            font-size: 8px; color: rgba(0,240,255,0.12);
        }
        .msg.usr .bub {
            background: rgba(240,0,255,0.04);
            border-color: rgba(240,0,255,0.08);
            border-bottom-right-radius: 2px;
            color: #fcd0ff;
        }
        .msg.usr .bub::after {
            content: '◈'; position: absolute; right: -9px; bottom: 3px;
            font-size: 8px; color: rgba(240,0,255,0.12);
        }

        .typing span {
            display: inline-block; width: 4px; height: 4px;
            border-radius: 50%; background: var(--cyan);
            margin: 0 1px;
            animation: tb 1s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: .15s; }
        .typing span:nth-child(3) { animation-delay: .3s; }
        @keyframes tb { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-6px);opacity:1} }

        /* Code block */
        .bub pre {
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(0,240,255,0.05);
            border-radius: 6px; padding: 8px 10px;
            font-family: var(--code); font-size: 10.5px; line-height: 1.4;
            overflow-x: auto; margin: 4px 0; color: #8cf; white-space: pre-wrap;
        }
        .bub .sr {
            background: rgba(0,240,255,0.02);
            border: 1px solid rgba(0,240,255,0.04);
            border-radius: 6px; padding: 6px 10px; margin: 3px 0;
        }
        .bub .sr-t { color: var(--cyan); font-weight: 600; font-size: 12px; }
        .bub .sr-s { color: rgba(255,255,255,0.5); font-size: 10.5px; }
        .bub .sr-u { color: var(--green); font-size: 9px; font-family: var(--code); }
        .bub .note {
            font-size: 9px; color: rgba(0,240,255,0.15);
            font-family: var(--code); margin-top: 3px;
        }

        .cpy {
            display: inline-block; margin-top: 3px; padding: 2px 8px;
            font-family: var(--code); font-size: 8px;
            background: rgba(0,240,255,0.04);
            border: 1px solid rgba(0,240,255,0.06);
            border-radius: 4px; color: var(--cyan); cursor: pointer;
            transition: all .1s;
        }
        .cpy:hover { background: rgba(0,240,255,0.08); }
        .cpy.ok { color: var(--green); border-color: rgba(0,255,65,0.15); }

        /* ===== INPUT ===== */
        .inp-area {
            padding: 8px 14px 12px;
            border-top: 1px solid rgba(0,240,255,0.04);
            display: flex; gap: 8px; align-items: flex-end;
            flex-shrink: 0; background: rgba(0,0,0,0.12);
        }
        .inp-area textarea {
            flex: 1;
            background: rgba(0,240,255,0.015);
            border: 1px solid rgba(0,240,255,0.06);
            border-radius: 10px; padding: 8px 12px;
            font-family: var(--font); font-size: 13px; font-weight: 500;
            color: #d0e8ff; resize: none; outline: none;
            min-height: 36px; max-height: 80px;
            transition: border-color .2s;
        }
        .inp-area textarea:focus { border-color: rgba(0,240,255,0.15); }
        .inp-area textarea::placeholder { color: rgba(0,240,255,0.1); }

        .btn {
            width: 40px; height: 40px; border-radius: 10px;
            border: 1px solid rgba(0,240,255,0.1);
            background: rgba(0,240,255,0.04); color: var(--cyan);
            font-size: 16px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all .15s; flex-shrink: 0;
        }
        .btn:hover {
            background: rgba(0,240,255,0.08);
            border-color: rgba(0,240,255,0.2);
            box-shadow: 0 0 20px rgba(0,240,255,0.04);
        }

        .footer {
            padding: 3px 16px;
            font-size: 8px; color: rgba(0,240,255,0.08);
            font-family: var(--code);
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.05);
            border-top: 1px solid rgba(0,240,255,0.02);
            flex-shrink: 0;
        }

        @media (max-width:540px) {
            .chat-wrap { max-width:100vw; max-height:100vh; border-radius:0; transform:none!important; }
            .chat-card { border-radius:0; }
            .chat-card::before { border-radius:0; }
            .msgs { padding:8px; }
            .msg { max-width:97%; }
            .bub { font-size:12.5px; }
        }
    </style>
</head>
<body>

<div id="holo-scene"></div>
<div class="crt"></div>
<div class="noise"></div>

<div class="chat-wrap" id="chatWrap">
    <div class="chat-card">
        <div class="header">
            <div class="h-avatar">🌀</div>
            <div class="h-info">
                <h1>AI HACKER HOLO</h1>
                <span class="h-status"><span class="h-dot"></span> NEURAL ONLINE · <span id="langShow">🌐 id</span></span>
            </div>
            <div class="h-badge">v6.0 HOLO</div>
        </div>

        <div class="msgs" id="msgs"></div>

        <div class="inp-area">
            <textarea id="inp" rows="1" placeholder="Tanya apapun, suruh buat kode, atau ngobrol..."></textarea>
            <button class="btn" id="snd">⏎</button>
        </div>
        <div class="footer">
            <span>🧠 NEURAL v6</span>
            <span>⚡ SEARCH · CODE · CHAT</span>
        </div>
    </div>
</div>

<script>
// ==================================================================
// 1. HOLOGRAPHIC 3D BACKGROUND — Rotating Cube Grid + Particles
// ==================================================================
(function holo() {
    const container = document.getElementById('holo-scene');
    const c = document.createElement('canvas');
    container.appendChild(c);
    const ctx = c.getContext('2d');
    let W, H;

    function resize() {
        W = c.width = innerWidth;
        H = c.height = innerHeight;
    }
    resize();
    addEventListener('resize', resize);

    // --- 3D Cube Grid Parameters ---
    const CUBE_SIZE = 28;
    const GRID = 6; // 6x6x6
    const HALF = GRID * CUBE_SIZE / 2;
    const nodes = [];
    const edges = [];

    // Build cube grid nodes
    for (let x = 0; x < GRID; x++) {
        for (let y = 0; y < GRID; y++) {
            for (let z = 0; z < GRID; z++) {
                nodes.push({
                    x: x * CUBE_SIZE - HALF + CUBE_SIZE/2,
                    y: y * CUBE_SIZE - HALF + CUBE_SIZE/2,
                    z: z * CUBE_SIZE - HALF + CUBE_SIZE/2,
                    ox: (Math.random() - 0.5) * 12,
                    oy: (Math.random() - 0.5) * 12,
                    oz: (Math.random() - 0.5) * 12,
                });
            }
        }
    }

    // Build edges (axis-aligned)
    function connect(a, b) {
        const dx = Math.abs(nodes[a].x - nodes[b].x);
        const dy = Math.abs(nodes[a].y - nodes[b].y);
        const dz = Math.abs(nodes[a].z - nodes[b].z);
        const dist = Math.round(dx + dy + dz);
        if (dist === CUBE_SIZE) edges.push({ a, b });
    }
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i+1; j < nodes.length; j++) {
            connect(i, j);
        }
    }

    // Particles (floating)
    const particles = Array.from({length: 150}, () => ({
        x: (Math.random() - 0.5) * 400,
        y: (Math.random() - 0.5) * 400,
        z: (Math.random() - 0.5) * 400,
        s: Math.random() * 1.2 + 0.3,
        sp: Math.random() * 0.3 + 0.05,
        ph: Math.random() * Math.PI * 2,
        hue: Math.random() > 0.6 ? 180 : 300,
    }));

    let mx = 0, my = 0, tx = 0, ty = 0;
    addEventListener('mousemove', e => {
        tx = (e.clientX / W - 0.5) * 0.8;
        ty = (e.clientY / H - 0.5) * 0.8;
    });

    let angle = 0;
    function draw() {
        // Smooth mouse
        mx += (tx - mx) * 0.05;
        my += (ty - my) * 0.05;

        angle += 0.0025;

        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, W, H);

        // Center offset
        const cx = W / 2 + mx * 15;
        const cy = H / 2 + my * 15;

        // Rotate nodes
        const rotX = angle + my * 0.3;
        const rotY = angle * 0.7 + mx * 0.3;
        const sinX = Math.sin(rotX), cosX = Math.cos(rotX);
        const sinY = Math.sin(rotY), cosY = Math.cos(rotY);

        const projected = nodes.map(n => {
            // Apply offset oscillation
            const ox = n.ox * Math.sin(angle * 0.5 + n.x * 0.01);
            const oy = n.oy * Math.cos(angle * 0.4 + n.y * 0.01);
            const oz = n.oz * Math.sin(angle * 0.6 + n.z * 0.01);

            let x = n.x + ox;
            let y = n.y + oy;
            let z = n.z + oz;

            // Rotate Y
            let x1 = x * cosY - z * sinY;
            let z1 = x * sinY + z * cosY;
            x = x1; z = z1;

            // Rotate X
            let y1 = y * cosX - z * sinX;
            let z2 = y * sinX + z * cosX;
            y = y1; z = z2;

            // Perspective
            const scale = 300 / (z + 400);
            const px = cx + x * scale;
            const py = cy + y * scale;

            return { px, py, z, scale: Math.max(0, scale) };
        });

        // Draw edges (back to front)
        const edgeVisible = edges.map(e => {
            const a = projected[e.a];
            const b = projected[e.b];
            const avgZ = (a.z + b.z) / 2;
            return { ...e, avgZ, aP: a, bP: b };
        }).sort((a, b) => b.avgZ - a.avgZ);

        for (const e of edgeVisible) {
            const alpha = Math.max(0.02, Math.min(0.08, (e.aP.scale + e.bP.scale) * 0.03));
            ctx.strokeStyle = `rgba(0,240,255,${alpha})`;
            ctx.lineWidth = 0.3 + (e.aP.scale + e.bP.scale) * 0.2;
            ctx.beginPath();
            ctx.moveTo(e.aP.px, e.aP.py);
            ctx.lineTo(e.bP.px, e.bP.py);
            ctx.stroke();
        }

        // Draw nodes (brightness by z)
        const sortedNodes = projected.map((p, i) => ({ ...p, i: i })).sort((a, b) => b.z - a.z);
        for (const n of sortedNodes) {
            const alpha = Math.max(0.1, Math.min(0.6, n.scale * 0.3));
            const size = 0.5 + n.scale * 1.0;
            ctx.beginPath();
            ctx.arc(n.px, n.py, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,240,255,${alpha})`;
            ctx.fill();

            // Outer glow
            ctx.beginPath();
            ctx.arc(n.px, n.py, size * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,240,255,${alpha * 0.05})`;
            ctx.fill();
        }

        // Draw particles
        for (const p of particles) {
            p.x += Math.sin(angle * p.sp + p.ph) * 0.08;
            p.y += Math.cos(angle * p.sp * 0.7 + p.ph) * 0.06;
            p.z += Math.sin(angle * p.sp * 0.5 + p.ph) * 0.04;

            // Wrap
            if (p.x > 220) p.x = -220; if (p.x < -220) p.x = 220;
            if (p.y > 220) p.y = -220; if (p.y < -220) p.y = 220;
            if (p.z > 220) p.z = -220; if (p.z < -220) p.z = 220;

            // Rotate
            let x = p.x, y = p.y, z = p.z;
            let x1 = x * cosY - z * sinY; let z1 = x * sinY + z * cosY; x = x1; z = z1;
            let y1 = y * cosX - z * sinX; let z2 = y * sinX + z * cosX; y = y1; z = z2;

            const sc = 300 / (z + 400);
            if (sc <= 0) continue;
            const px = cx + x * sc;
            const py = cy + y * sc;
            const al = Math.max(0.05, Math.min(0.4, sc * 0.2));
            const col = p.hue === 180 ? `rgba(0,240,255,${al})` : `rgba(240,0,255,${al * 0.7})`;
            ctx.beginPath();
            ctx.arc(px, py, p.s * sc, 0, Math.PI * 2);
            ctx.fillStyle = col;
            ctx.fill();
        }

        // Subtle center glow
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
        grad.addColorStop(0, 'rgba(0,240,255,0.01)');
        grad.addColorStop(1, 'rgba(0,240,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        requestAnimationFrame(draw);
    }
    draw();
})();

// ==================================================================
// 2. LANGUAGE DETECTOR
// ==================================================================
const Lang = {
    detect(t) {
        if (!t) return 'en';
        if (/[\u4e00-\u9fff]/.test(t)) return 'zh';
        if (/[\u3040-\u309f\u30a0-\u30ff]/.test(t)) return 'ja';
        if (/[\uac00-\ud7af]/.test(t)) return 'ko';
        if (/[\u0600-\u06ff]/.test(t)) return 'ar';
        if (/[\u0400-\u04ff]/.test(t)) return 'ru';
        if (/[\u0e00-\u0e7f]/.test(t)) return 'th';
        if (/[\u0900-\u097f]/.test(t)) return 'hi';

        const words = (t.match(/[a-z]+/gi) || []).map(w => w.toLowerCase());
        const maps = {
            id: ['yang','dan','di','dengan','untuk','tidak','ini','dari','akan','dapat','bisa','saya','kita','ada','telah','atau','juga','ke','oleh','pada','dalam','itu','saat','kalau','saja','aku','dia','kami','bukan','ya','tolong','bantu','buat','bikin','cari','lihat','mana','apa','kenapa','bagaimana','kapan','siapa','saya','kamu','dia','mereka'],
            en: ['the','and','for','are','but','not','you','all','any','can','had','her','was','one','our','out','has','have','been','some','them','than','that','this','very','what','when','which','who','will','with','your','please','help','search','find','look','make','create','code','want','need','tell'],
            es: ['el','la','los','las','que','y','en','un','una','por','con','para','como','más','pero','sus','son','era','han','está','ser','haber','tener','hacer','poder','decir','entre','todo','también','donde','quien','cual'],
            fr: ['le','la','les','de','du','des','et','en','un','une','pour','avec','dans','sur','que','qui','pas','nous','vous','ils','elles','est','sont','ont','fait','faire','être','avoir','pouvoir','vouloir'],
            de: ['der','die','das','und','in','den','von','zu','mit','auf','für','ist','sind','war','hat','haben','sein','werden','können','müssen','sagen','auch','noch','aus','bei','nach','um','nicht','aber','oder'],
            pt: ['o','a','os','as','de','da','do','em','para','com','um','uma','por','mais','mas','foi','são','tem','ter','seu','sua','como','entre','todo','também','onde','quem','qual']
        };
        let best = 'en', bestN = 0;
        for (const [lang, list] of Object.entries(maps)) {
            const n = words.filter(w => list.includes(w)).length;
            if (n > bestN) { bestN = n; best = lang; }
        }
        return bestN < 2 ? 'en' : best;
    },
    name(c) {

const Net = {
    async ddg(q) {
        try {
            const r = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1&t=ai_hacker_holo`);
            const d = await r.json();
            const res = [];
            if (d.AbstractText) res.push({ type:'answer', title:d.Heading||'Info', text:d.AbstractText, url:d.AbstractURL });
            if (d.Answer) res.push({ type:'answer', title:'Answer', text:d.Answer });
            if (d.Definition) res.push({ type:'def', title:'Definition', text:d.Definition, url:d.DefinitionURL });
            if (d.RelatedTopics) {
                for (const t of d.RelatedTopics.slice(0,5)) {
                    if (t.Text) res.push({ type:'rel', title:t.Text.split(' - ')[0]||t.Text, text:t.Text, url:t.FirstURL });
                    else if (t.Topics) for (const s of t.Topics.slice(0,2)) if (s.Text) res.push({ type:'rel', title:s.Text.split(' - ')[0]||s.Text, text:s.Text, url:s.FirstURL });
                }
            }
            if (d.Results) for (const r of d.Results.slice(0,3)) res.push({ type:'result', text:r.Text, url:r.FirstURL });
            return res.length ? res : null;
        } catch(e) { return null; }
    },

    async wiki(q, lang='en') {
        try {
            const l = ['id','en','zh','ja','ko','ar','ru','es','fr','de','pt'].includes(lang) ? lang : 'en';
            const r = await fetch(`https://${l}.wikipedia.org/w/api.php?action=query&list=search&prop=info&inprop=url&utf8=&format=json&origin=*&srlimit=3&srsearch=${encodeURIComponent(q)}`);
            const d = await r.json();
            if (!d.query?.search?.length) return null;
            return d.query.search.map(s => ({ title:s.title, text:s.snippet.replace(/<[^>]+>/g,''), url:`https://${l}.wikipedia.org/?curid=${s.pageid}`, id:s.pageid }));
        } catch(e) { return null; }
    },

    async wikiExtract(id, lang='en') {
        try {
            const l = ['id','en','zh','ja','ko','ar','ru','es','fr','de','pt'].includes(lang) ? lang : 'en';
            const r = await fetch(`https://${l}.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&exsentences=4&format=json&origin=*&pageids=${id}`);
            const d = await r.json();
            const p = d.query?.pages;
            if (!p) return null;
            const pid = Object.keys(p)[0];
            return p[pid]?.extract || null;
        } catch(e) { return null; }
    },

    async search(q, lang='en') {
        const [ddgR, wikiR] = await Promise.all([this.ddg(q), this.wiki(q, lang)]);
        let ext = null;
        if (wikiR?.length) ext = await this.wikiExtract(wikiR[0].id, lang);
        return { ddg: ddgR, wiki: wikiR, extract: ext };
    },

    async fetchUrl(url) {
        try {
            if (!url.startsWith('http')) url = 'https://' + url;
            const r = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(8000) });
            const txt = await r.text();
            const title = (txt.match(/<title[^>]*>([^<]*)<\/title>/i) || [,'(no title)'])[1];
            let body = (txt.match(/<body[^>]*>([\s\S]*)<\/body>/i) || [,''])[1] || txt;
            body = body.replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'').replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'').replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/g,' ').replace(/\s+/g,' ').trim().substring(0,1500);
            return { title, url, body, full: txt.length };
        } catch(e) { return null; }
    }
};

    isCodeReq(t) {
        const patterns = [

            /(?:tolong|please).*(?:buat|bikin|create|make).*(?:kode|code)/i,

    isUrlReq(t) {
        return /(?:buka|fetch|open|ambil|lihat|akses)\s*(?::\s*)?(?:https?:\/\/)?(?:[a-z0-9-]+\.)+[a-z]{2,}/i.test(t) || /^https?:\/\/[^\s]+/.test(t);
